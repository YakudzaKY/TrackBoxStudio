name: Build Check

on:
  pull_request:
    branches: [ main ] # Or your default branch

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Using the version from the csproj

    - name: Build
      run: dotnet build "TrackBoxStudio.csproj" -c Release
